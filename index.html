<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intel Briefing | 全球 AI 情报终端</title>

    <!-- Fonts: Premium Typography Selection -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        :root {
            /* Cyber Intelligence Palette */
            --bg-deep: #020408;
            --bg-base: #0a0c10;
            --bg-surface: rgba(16, 20, 28, 0.7);
            --bg-elevated: rgba(26, 31, 44, 0.8);
            
            --text-bright: #ffffff;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --text-dim: #1e293b;

            --accent-primary: #38bdf8; /* Cyan Intelligence */
            --accent-secondary: #818cf8; /* Indigo Analysis */
            --accent-glow: rgba(56, 189, 248, 0.2);
            --border-glow: rgba(56, 189, 248, 0.1);
            
            --sidebar-width: 320px;
            --header-height: 80px;
            --tabs-height: 56px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;

            --font-display: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
        }

        /* --- Global Reset & Scrollbars --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-dim);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-deep);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.02) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* Ambient Glow Background */
        body::before {
            content: '';
            position: fixed;
            top: -10%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.05) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
        }

        /* --- Sidebar Navigation --- */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--bg-surface);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .sidebar-header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            padding: 0 28px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.04em;
            position: relative;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .sidebar-header .brand {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-primary);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--accent-primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 16px;
        }

        .category {
            margin-bottom: 24px;
        }

        .category-title {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-dim);
            margin-bottom: 12px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.03);
        }

        .file-list {
            list-style: none;
        }

        .file-link {
            display: block;
            padding: 12px 14px;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 2px;
            border: 1px solid transparent;
            position: relative;
            background: rgba(255, 255, 255, 0.01);
        }

        .file-link:hover {
            color: var(--text-bright);
            background: rgba(255, 255, 255, 0.04);
        }

        .file-link.active {
            background: var(--bg-elevated);
            color: var(--accent-primary);
            border-color: var(--border-glow);
        }

        .file-info {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .file-title {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-date {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            color: var(--text-muted);
        }

        .sidebar-footer {
            padding: 16px 24px;
            font-size: 0.65rem;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.15);
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            font-family: var(--font-mono);
        }

        /* --- Main Content Layout --- */
        #main-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        /* --- Top Tab Bar --- */
        #top-navigation {
            height: var(--tabs-height);
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: none; /* Shown when content is loaded */
            align-items: center;
            padding: 0 40px;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            z-index: 50;
        }

        #top-navigation::-webkit-scrollbar {
            display: none;
        }

        .nav-tab {
            padding: 8px 16px;
            font-family: var(--font-display);
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-tab:hover {
            color: var(--text-bright);
            background: rgba(255, 255, 255, 0.04);
        }

        .nav-tab.active {
            color: var(--accent-primary);
            background: rgba(56, 189, 248, 0.1);
        }

        /* --- Content Area --- */
        #content-area {
            flex: 1;
            overflow-y: auto;
            position: relative;
            padding: 40px 5% 100px;
            scroll-behavior: smooth;
        }

        .content-container {
            max-width: 840px;
            margin: 0 auto;
        }

        /* --- States UI --- */
        .state-layer {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 40px;
            z-index: 50;
        }

        .state-layer.active {
            display: flex;
        }

        .terminal-loader {
            font-family: var(--font-mono);
            color: var(--accent-primary);
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 24px 32px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-glow);
        }

        .loader-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background: var(--accent-primary);
            margin-left: 4px;
            animation: blink 0.8s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* --- Section Rendering --- */
        .report-section {
            display: none;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .report-section.active {
            display: block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Markdown Aesthetics --- */
        .markdown-body {
            color: var(--text-primary);
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .markdown-body h1 {
            font-family: var(--font-display);
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 0.5em;
            color: #fff;
        }

        .markdown-body h2 {
            display: none; /* We use these as tabs now */
        }

        .markdown-body h3 {
            font-size: 1.35rem;
            margin: 1.8em 0 0.8em;
            color: var(--accent-primary);
            font-weight: 600;
        }

        .markdown-body p { margin-bottom: 1.6em; color: var(--text-secondary); }
        .markdown-body strong { color: #fff; font-weight: 600; }
        .markdown-body a { color: var(--accent-primary); text-decoration: none; transition: color 0.3s; }
        .markdown-body a:hover { color: #fff; text-decoration: underline; }

        .markdown-body blockquote {
            margin: 2em 0;
            padding: 20px 28px;
            background: rgba(56, 189, 248, 0.03);
            border-left: 3px solid var(--accent-primary);
            border-radius: 4px;
            color: var(--text-primary);
        }

        .markdown-body pre {
            background: #0d1117;
            padding: 24px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin: 2em 0;
            overflow: auto;
        }

        .markdown-body img {
            width: 100%;
            border-radius: var(--radius-lg);
            margin: 2em 0;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        @media (max-width: 768px) {
            #sidebar { position: fixed; transform: translateX(-100%); width: 300px; }
            #sidebar.open { transform: translateX(0); }
            #top-navigation { padding: 0 20px; }
            .markdown-body h1 { font-size: 2rem; }
        }
    </style>
</head>

<body>
    <div id="mobile-overlay" onclick="toggleSidebar()"></div>

    <aside id="sidebar">
        <div class="sidebar-header">
            <div class="brand"><div class="brand-dot"></div>INTEL BRIEFING</div>
        </div>
        <div class="sidebar-content" id="sidebar-nav">
            <div style="height: 100%; display: flex; align-items:center; justify-content: center; opacity: 0.3;">
                <div class="loader-cursor"></div>
            </div>
        </div>
        <div class="sidebar-footer">
            <div id="status-text">BOOTING...</div>
            <div id="last-updated" style="margin-top: 4px; color: var(--text-dim);">NO_INDEX</div>
        </div>
    </aside>

    <main id="main-wrapper">
        <header id="top-navigation">
            <!-- Tabs injected here -->
        </header>

        <div id="content-area">
            <div class="content-container">
                <div id="state-loading" class="state-layer">
                    <div class="terminal-loader">> DECRYPTING_STREAM...<span class="loader-cursor"></span></div>
                </div>

                <div id="state-empty" class="state-layer active">
                    <h2 style="font-family: var(--font-display); font-size: 2rem; margin-bottom: 8px;">Waiting for Intel...</h2>
                    <p style="color: var(--text-muted); font-family: var(--font-mono); font-size: 0.75rem;">SELECT A STREAM FROM THE SIDEBAR</p>
                </div>

                <div id="state-error" class="state-layer">
                    <div style="color: #f87171; font-family: var(--font-mono); border: 1px solid #7f1d1d; padding: 20px; background: rgba(127, 29, 29, 0.1);">
                        [FATAL] STREAM_CORRUPTED
                    </div>
                </div>

                <div id="markdown-content" class="markdown-body"></div>
            </div>
        </div>
    </main>

    <script>
        const INDEX_URL = 'reports/index.json';
        const REPORTS_BASE = 'reports/';

        marked.setOptions({
            gfm: true,
            breaks: true,
            highlight: (code, lang) => hljs.highlight(code, { language: hljs.getLanguage(lang) ? lang : 'plaintext' }).value
        });

        const elements = {
            sidebarNav: document.getElementById('sidebar-nav'),
            contentDiv: document.getElementById('markdown-content'),
            stateLoading: document.getElementById('state-loading'),
            stateEmpty: document.getElementById('state-empty'),
            stateError: document.getElementById('state-error'),
            topNav: document.getElementById('top-navigation'),
            lastUpdated: document.getElementById('last-updated'),
            statusText: document.getElementById('status-text')
        };

        let reportsIndex = null;
        let currentPath = null;
        let sections = [];

        async function init() {
            try {
                const res = await fetch(INDEX_URL);
                reportsIndex = await res.json();
                renderSidebar();
                if (reportsIndex.last_updated) elements.lastUpdated.textContent = `LAST_SYNC: ${new Date(reportsIndex.last_updated).toLocaleString()}`;
                
                const hash = window.location.hash.slice(1);
                if (hash) loadReport(decodeURIComponent(hash));
                else autoLoadLatest();
            } catch (err) {
                elements.statusText.textContent = 'INIT_FAIL';
            }
        }

        function renderSidebar() {
            elements.sidebarNav.innerHTML = reportsIndex.categories.map(cat => `
                <div class="category">
                    <div class="category-title">${cat.name}</div>
                    <ul class="file-list">
                        ${cat.files.map(f => `
                            <li>
                                <a class="file-link" data-path="${f.path}" onclick="loadReport('${f.path}')">
                                    <div class="file-info">
                                        <div class="file-title">${f.title}</div>
                                        <div class="file-date">${new Date(f.date).toLocaleDateString()}</div>
                                    </div>
                                </a>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');
        }

        function autoLoadLatest() {
            const cat = reportsIndex.categories[0];
            if (cat?.files?.length) loadReport(cat.files[0].path);
        }

        async function loadReport(path) {
            if (!path || path === currentPath) return;
            currentPath = path;
            window.location.hash = path;
            
            updateSidebarActive();
            setViewState('loading');
            elements.topNav.style.display = 'none';

            try {
                const res = await fetch(REPORTS_BASE + path);
                const markdown = await res.text();
                
                // Process sections
                const rawHtml = marked.parse(markdown);
                const safeHtml = DOMPurify.sanitize(rawHtml);
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(safeHtml, 'text/html');
                
                // Extract metadata (everything before the first H2)
                const metadata = [];
                let firstH2 = doc.querySelector('h2');
                let node = doc.body.firstChild;
                while (node && node !== firstH2) {
                    metadata.push(node.cloneNode(true));
                    node = node.nextSibling;
                }

                // Extract Sections based on H2
                const parsedSections = [];
                const h2s = doc.querySelectorAll('h2');
                h2s.forEach((h2, index) => {
                    const sectionContent = [];
                    let next = h2.nextSibling;
                    while (next && next.tagName !== 'H2') {
                        sectionContent.push(next.cloneNode(true));
                        next = next.nextSibling;
                    }
                    parsedSections.push({
                        title: h2.textContent.trim(),
                        id: `section-${index}`,
                        html: sectionContent.map(n => n.outerHTML || n.textContent).join('')
                    });
                });

                renderReport(metadata, parsedSections);
                setViewState('content');
                elements.topNav.style.display = 'flex';
            } catch (e) {
                setViewState('error');
            }
        }

        function renderReport(metadata, parsedSections) {
            sections = parsedSections;
            const metaHtml = metadata.map(n => n.outerHTML || n.textContent).join('');
            
            // Render Tabs
            elements.topNav.innerHTML = `<div class="nav-tab active" onclick="switchTab('overview')">📌 OVERVIEW</div>` + 
                sections.map((s, idx) => `
                    <div class="nav-tab" id="tab-${s.id}" onclick="switchTab('${s.id}')">
                        ${s.title}
                    </div>
                `).join('');

            // Container for sections
            elements.contentDiv.innerHTML = `
                <div id="section-overview" class="report-section active">
                    ${metaHtml}
                    <div style="margin-top:40px; border-top:1px solid rgba(255,255,255,0.05); padding-top:20px;">
                        <p style="font-family:var(--font-mono); font-size:0.8rem; color:var(--accent-primary);">
                            > READY_TO_ANALYZE: 请从顶部 Tab 切换查看具体板块。
                        </p>
                    </div>
                </div>
                ${sections.map(s => `
                    <div id="${s.id}" class="report-section">
                        <h2 style="display:block; font-family:var(--font-display); font-size:2rem; margin-bottom:1.5rem; color:#fff;">
                            ${s.title}
                        </h2>
                        ${s.html}
                    </div>
                `).join('')}
            `;
        }

        function switchTab(id) {
            document.querySelectorAll('.report-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            
            const target = document.getElementById(id === 'overview' ? 'section-overview' : id);
            if (target) {
                target.classList.add('active');
                if (id === 'overview') document.querySelector('.nav-tab').classList.add('active');
                else document.getElementById(`tab-${id}`).classList.add('active');
                elements.contentDiv.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function updateSidebarActive() {
            document.querySelectorAll('.file-link').forEach(el => {
                el.classList.toggle('active', el.getAttribute('data-path') === currentPath);
            });
        }

        function setViewState(state) {
            [elements.stateLoading, elements.stateEmpty, elements.stateError, elements.contentDiv].forEach(el => el.classList.remove('active'));
            elements.contentDiv.style.display = (state === 'content') ? 'block' : 'none';
            if (state === 'loading') elements.stateLoading.classList.add('active');
            if (state === 'empty') elements.stateEmpty.classList.add('active');
            if (state === 'error') elements.stateError.classList.add('active');
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('open');
            document.getElementById('mobile-overlay').classList.toggle('active');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
