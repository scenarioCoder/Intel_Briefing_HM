name: Daily Intelligence Report

on:
  schedule:
    - cron: '51 23 * * *'  # UTC 23:51 = 北京 07:51（避开整点高峰）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Morning Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_BASE_URL: https://api.gptsapi.net/v1/chat/completions
          XAI_MODEL: grok-3
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python run_mission.py

      - name: Commit and push updated reports
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports/
          
          if git diff --cached --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "data: auto-generate daily intel report"
            git push
            echo "✅ Report published to repository"
          fi
